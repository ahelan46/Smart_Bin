<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Smart Bin Monitoring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body.dark-mode {
            --bg-body: #141e30;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        html.dark-mode {
            background-color: #141e30;
        }

        body {
            background-color: var(--bg-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-main);
        }

        .auth-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Make username and email full width */
        .full-width {
            grid-column: span 2;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-width {
                grid-column: span 1;
            }
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .phone-group {
            display: flex;
            gap: 8px;
        }

        .country-code {
            flex: 0 0 80px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
        }

        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
    </style>
    <script>
        (function () {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
            }
        })();
    </script>
</head>

<body class="dark-mode">

    <div id="theme-toggle" onclick="toggleTheme()"
        style="position: fixed; top: 20px; right: 20px; cursor: pointer; font-size: 24px; z-index: 1000;">🌙</div>

    <div class="auth-card">
        <div class="header">
            <h1>Create Account</h1>
            <p style="color: var(--text-muted); font-size: 14px;">Join the citizen power for cleaner cities.</p>
        </div>

        <form method="POST" id="signupForm" autocomplete="off">
            {% csrf_token %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Full Name</label>
                    <input type="text" name="first_name" id="fullName" placeholder="Enter your full name"
                        autocomplete="off" required>
                    <small id="nameError" style="color:#ef4444; font-size:11px; display:none;">Please enter string
                        only.</small>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter your username" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="Enter your age" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="phone-group">
                        <select class="country-code" id="countryCode">
                            <option value="+91">IN +91</option>
                            <option value="+1">US +1</option>
                            <option value="+44">UK +44</option>
                        </select>
                        <input type="text" id="phoneInput" placeholder="Enter phone number" autocomplete="off" required>
                    </div>
                    <input type="hidden" name="phone_number" id="finalPhone">
                    <small id="phoneError" style="color:#ef4444; font-size:11px; display:none;">Please enter exactly 10
                        digits.</small>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-container">
                        <input type="password" name="password1" id="password1" placeholder="Enter password"
                            autocomplete="new-password" required>
                        <i class="far fa-eye password-toggle" onclick="togglePass('password1', this)"></i>
                    </div>
                    <small id="passError" style="color:#ef4444; font-size:11px; display:none;"></small>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-container">
                        <input type="password" name="password2" id="password2" placeholder="Confirm password"
                            autocomplete="new-password" required>
                        <i class="far fa-eye password-toggle" onclick="togglePass('password2', this)"></i>
                    </div>
                </div>
            </div>

            <input type="hidden" name="auto_location" id="auto_location">

            <button type="submit">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>

    <script>
        function updateToggleIcon(isDark) {
            const toggle = document.getElementById('theme-toggle');
            if (toggle) {
                toggle.innerText = isDark ? '☀️' : '🌙';
            }
        }

        function toggleTheme() {
            const isDark = !document.documentElement.classList.contains('dark-mode');

            document.documentElement.classList.toggle('dark-mode', isDark);
            document.body.classList.toggle('dark-mode', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');

            updateToggleIcon(isDark);
        }

        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const isDark = savedTheme === 'dark';

            if (isDark) {
                document.documentElement.classList.add('dark-mode');
                document.body.classList.add('dark-mode');
            } else {
                document.documentElement.classList.remove('dark-mode');
                document.body.classList.remove('dark-mode');
            }
            updateToggleIcon(isDark);

            // Sync with other tabs
            window.addEventListener('storage', (e) => {
                if (e.key === 'theme') {
                    const newIsDark = e.newValue === 'dark';
                    if (newIsDark) {
                        document.documentElement.classList.add('dark-mode');
                        document.body.classList.add('dark-mode');
                    } else {
                        document.documentElement.classList.remove('dark-mode');
                        document.body.classList.remove('dark-mode');
                    }
                    updateToggleIcon(newIsDark);
                }
            });

            const signupForm = document.getElementById('signupForm');
            const fullName = document.getElementById('fullName');
            const username = document.querySelector('input[name="username"]');
            const email = document.querySelector('input[name="email"]');
            const age = document.querySelector('input[name="age"]');
            const phoneInput = document.getElementById('phoneInput');
            const countryCode = document.getElementById('countryCode');
            const finalPhone = document.getElementById('finalPhone');
            const password1 = document.getElementById('password1');
            const password2 = document.getElementById('password2');

            // Clear inputs on load (with short delay to fight autocomplete)
            const clearInputs = () => {
                [fullName, username, email, age, phoneInput, password1, password2].forEach(el => {
                    if (el) el.value = "";
                });
            };
            clearInputs();
            setTimeout(clearInputs, 100);

            signupForm.addEventListener('submit', function (e) {
                let valid = true;

                // 1. Name validation (string only)
                const nameRegex = /^[A-Za-z\s]+$/;
                if (!nameRegex.test(fullName.value)) {
                    document.getElementById('nameError').style.display = 'block';
                    valid = false;
                } else {
                    document.getElementById('nameError').style.display = 'none';
                }

                // 2. Phone validation (10 digits)
                const phoneRegex = /^\d{10}$/;
                if (!phoneRegex.test(phoneInput.value)) {
                    document.getElementById('phoneError').style.display = 'block';
                    valid = false;
                } else {
                    document.getElementById('phoneError').style.display = 'none';
                    finalPhone.value = countryCode.value + " " + phoneInput.value;
                }

                // 3. Password validation
                const pass = password1.value;
                const passError = document.getElementById('passError');

                if (pass.length < 8) {
                    passError.innerText = "Short password not accepted (min 8 chars).";
                    passError.style.display = 'block';
                    valid = false;
                } else {
                    // Complexity: mix of capital, number, special (* etc)
                    const complexityRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[*@#$%^&+=!]).*$/;
                    if (!complexityRegex.test(pass)) {
                        passError.innerText = "Password must include capital, number, and special character (*, @, etc).";
                        passError.style.display = 'block';
                        valid = false;
                    } else if (pass !== password2.value) {
                        passError.innerText = "Passwords do not match.";
                        passError.style.display = 'block';
                        valid = false;
                    } else {
                        passError.style.display = 'none';
                    }
                }

                if (!valid) {
                    e.preventDefault();
                }
            });
        });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function (position) {
                document.getElementById("auto_location").value =
                    position.coords.latitude + "," + position.coords.longitude;
            });
        }
    </script>

</body>

</html>
